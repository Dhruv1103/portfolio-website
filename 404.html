<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | John Doe Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .error-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }

      .error-container h1 {
        font-size: 8rem;
        color: var(--primary-color);
        margin-bottom: 0;
        line-height: 1;
      }

      .error-container h2 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        color: var(--text-dark);
      }

      .error-container p {
        color: var(--text-light);
        margin-bottom: 2rem;
        max-width: 500px;
      }

      .error-illustration {
        width: 300px;
        max-width: 100%;
        margin-bottom: 2rem;
      }

      @media screen and (max-width: 600px) {
        .error-container h1 {
          font-size: 5rem;
        }

        .error-container h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <svg
        class="error-illustration"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 500 500"
      >
        <circle cx="250" cy="250" r="200" fill="#f5f5f5" />
        <path
          d="M250,50c110.5,0,200,89.5,200,200s-89.5,200-200,200S50,360.5,50,250S139.5,50,250,50z"
          fill="none"
          stroke="#5e3bee"
          stroke-width="10"
          stroke-dasharray="15,15"
        />
        <text
          x="50%"
          y="52%"
          font-family="Arial"
          font-size="120"
          font-weight="bold"
          text-anchor="middle"
          fill="#5e3bee"
        >
          404
        </text>
      </svg>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>
        Oops! The page you're looking for doesn't exist or has been moved. Let's
        get you back on track.
      </p>
      <a href="index.html" class="btn primary-btn">Back to Home</a>
    </div>

    <script>
      // Check for saved theme preference
      const currentTheme = localStorage.getItem("theme")
        ? localStorage.getItem("theme")
        : "light";
      document.documentElement.setAttribute("data-theme", currentTheme);
    </script>
  </body>
</html>
